<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Bayan Flow - Interactive Algorithm Visualizer</title>
    <meta name="title" content="Bayan Flow - Interactive Algorithm Visualizer" />
    <meta
      name="description"
      content="Bayan Flow: Learn 45 algorithms with clarity through interactive step-by-step visualizations — sorting, pathfinding, searching, tree traversal, and graph algorithms. Free educational web app with Python examples and complexity analysis. Bayan (بيان) means clarity in Arabic."
    />
    <meta
      name="keywords"
      content="bayan flow, algorithm visualizer, sorting algorithms, pathfinding, graph algorithms, tree traversal, searching algorithms, computer science, education, interactive learning, dijkstra, bfs, merge sort, clarity"
    />
    <meta name="author" content="Ayoub Abidi" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bayanflow.com/" />

    <!-- Non-production hostnames: noindex at runtime (deploy previews, dev, Netlify URLs) -->
    <script>
      (function () {
        var hostname = window.location.hostname;
        var shouldNoIndex =
          hostname === 'dev.bayanflow.com' ||
          hostname === 'localhost' ||
          hostname === '127.0.0.1' ||
          hostname.indexOf('deploy-preview') !== -1 ||
          (hostname.slice(-12) === '.netlify.app' &&
            hostname !== 'bayanflow.com' &&
            hostname !== 'www.bayanflow.com');

        if (shouldNoIndex) {
          var robots = document.querySelector('meta[name="robots"]');
          if (robots) {
            robots.setAttribute('content', 'noindex, nofollow');
          }
        }
      })();
    </script>

    <!-- Umami Analytics - Dynamically loaded based on environment -->
    <script>
      (function () {
        const hostname = window.location.hostname;
        let websiteId;
        if (
          hostname === 'dev.bayanflow.com' ||
          hostname === 'dev-bayanflow.netlify.app' ||
          hostname.includes('deploy-preview')
        ) {
          // Develop
          websiteId = 'b21ffc5d-66c1-4bfc-9e54-e05dbbe26852';
        } else if (
          hostname === 'bayanflow.com' ||
          hostname === 'www.bayanflow.com' ||
          hostname === 'bayanflow.netlify.app' ||
          hostname === 'www.bayanflow.netlify.app'
        ) {
          // main
          websiteId = 'c096589e-f026-47e9-b458-aeb6850d5d5c';
        }
        if (websiteId) {
          const script = document.createElement('script');
          script.defer = true;
          script.src = 'https://cloud.umami.is/script.js';
          script.setAttribute('data-website-id', websiteId);
          document.head.appendChild(script);
        }
      })();
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bayanflow.com/" />
    <meta
      property="og:title"

    />

        "@type": "WebApplication",
        "name": "Bayan Flow",
        "description": "Bayan Flow: Interactive educational tool for learning sorting, pathfinding, searching, tree traversal, and graph algorithms through step-by-step visual animations with clarity. Bayan (بيان) means clarity in Arabic.",
        "url": "https://bayanflow.com/",

        "operatingSystem": "Web Browser",
        "author": {
          "@type": "Person",

    <!-- Theme Script -->
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem('theme');
          const prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches;
          const theme = savedTheme || (prefersDark ? 'dark' : 'light');

          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          console.error('Failed to initialize theme:', e);
        }
      })();
    </script>
  </head>
