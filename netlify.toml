# Kept for rollback during Netlify → Cloudflare migration.
# CI no longer deploys here; remove this file after Netlify projects are deleted (~2 weeks post cutover).

[build]
  command = "pnpm build"
  publish = "dist"
  
[build.environment]
  NODE_VERSION = "24.11.1"
  PNPM_VERSION = "9"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: https://cloud.umami.is https://static.cloudflareinsights.com https://cdn.jsdelivr.net; connect-src 'self' blob: https://cloud.umami.is https://gateway.umami.is https://cloudflareinsights.com https://api.github.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://api.producthunt.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data:; worker-src 'self' blob:; frame-src https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'"

# SPA routing: rewrite all non-file requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Production branch (main)
[context.production]
  command = "pnpm build"
  [context.production.environment]
    VITE_GIT_BRANCH = "main"
  
# Develop branch (beta environment)
[context.develop]
  command = "pnpm build"
  [context.develop.environment]
    VITE_GIT_BRANCH = "develop"
  
# Deploy previews for PRs
[context.deploy-preview]
  command = "pnpm build"

# Branch deploys (non-production branches)
[context.branch-deploy]
  command = "pnpm build"
